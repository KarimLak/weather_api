include:
  - path: infra.yml
services:
  app:
    image: karimlak/montreal-weather-api:latest
    ports: 
      - 8080:80
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /montreal_weather_api
        - action: rebuild
          path: requirements.txt
